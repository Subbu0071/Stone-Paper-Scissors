<!DOCTYPE html>
<!--
    Stone Paper Scissors - Enhanced Edition (Updated)
    Adds: Smart AI (predictive), Game Modes (Best-of, First-to, Timed)
    Author: Subroto Sarkar
-->
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stone Paper Scissors - Enhanced Edition</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="enhanced-bg">
    <div class="container py-5">
       <!-- Header -->
<div class="text-center mb-4">
    <h1 class="display-3 fw-bold text-gradient">Stone Paper Scissors</h1>
</div>

        <!-- Main Card -->
        <div class="row justify-content-center">
            <div class="col-12 d-flex justify-content-center">
                <div class="enhanced-card p-4 rounded-4 shadow-lg" style="max-width: 920px; width: 100%; margin: 2.5rem 0;">

                    <!-- Difficulty Section (centered) -->
                    <div class="d-flex justify-content-center mb-3">
                        <section class="difficulty-area-enhanced mb-2 w-100" style="max-width: 700px;">
                            <label class="form-label fw-bold mb-2">Difficulty:</label>
                            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                                <!-- Stepper -->
                                <div id="difficulty-stepper" class="me-3 d-flex align-items-center">
                                    <div class="stepper-step" data-difficulty="easy" title="Easy: Computer is random">1</div>
                                    <div class="stepper-line"></div>
                                    <div class="stepper-step active" data-difficulty="medium" title="Medium: Computer is smarter">2</div>
                                    <div class="stepper-line"></div>
                                    <div class="stepper-step" data-difficulty="hard" title="Hard: Computer tries to win">3</div>
                                </div>

                                <!-- Flip Cards -->
                                <div id="difficulty-cards" class="d-flex align-items-center">
                                    <div class="flip-card" data-difficulty="easy">
                                        <div class="flip-card-inner">
                                            <div class="flip-card-front">😃<div>Easy</div></div>
                                            <div class="flip-card-back">Random<br>Computer</div>
                                        </div>
                                    </div>
                                    <div class="flip-card selected" data-difficulty="medium">
                                        <div class="flip-card-inner">
                                            <div class="flip-card-front">😎<div>Medium</div></div>
                                            <div class="flip-card-back">Smarter<br>Computer</div>
                                        </div>
                                    </div>
                                    <div class="flip-card" data-difficulty="hard">
                                        <div class="flip-card-inner">
                                            <div class="flip-card-front">😈<div>Hard</div></div>
                                            <div class="flip-card-back">Tries<br>to Win</div>
                                        </div>
                                    </div>
                                </div>

                                <!-- AI Toggle -->
                                <div class="ms-auto d-flex align-items-center gap-2 justify-content-center">
                                    <div class="small text-muted">AI Type</div>
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" id="ai-enable" checked>
                                        <label class="form-check-label small" for="ai-enable">Predictive AI</label>
                                    </div>
                                </div>
                            </div>
                        </section>
                    </div>

                    <!-- Scoreboard -->
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span class="badge bg-primary fs-5">Player: <span id="player-score">0</span></span>
                        <div class="text-center">
                            <div id="game-mode-banner" class="small text-muted">Mode: Best of 5</div>
                            <div id="timer-display" class="fw-semibold small text-danger"></div>
                        </div>
                        <span class="badge bg-danger fs-5">Computer: <span id="computer-score">0</span></span>
                    </div>

                    <!-- Result Area -->
                    <div class="result-area my-4 text-center">
                        <h2 id="result-message" class="fw-bold"></h2>
                        <div class="d-flex justify-content-center align-items-center gap-5 mt-3">
                            <div>
                                <div class="fs-1" id="player-choice">❔</div>
                                <div class="small">You</div>
                            </div>
                            <div>
                                <div class="fs-1" id="computer-choice">❔</div>
                                <div class="small">Computer</div>
                            </div>
                        </div>
                    </div>

                    <!-- Gesture Buttons -->
                    <div class="d-flex justify-content-center gap-4 mb-4">
                        <button class="gesture-btn-enhanced btn btn-outline-primary btn-lg rounded-4 shadow-sm mx-2 px-4 py-3 d-flex flex-column align-items-center justify-content-center fw-bold fs-4" data-gesture="rock">
                            <span class="gesture-icon-enhanced fs-1 mb-1">🪨</span>
                            <div>Stone</div>
                        </button>
                        <button class="gesture-btn-enhanced btn btn-outline-success btn-lg rounded-4 shadow-sm mx-2 px-4 py-3 d-flex flex-column align-items-center justify-content-center fw-bold fs-4" data-gesture="paper">
                            <span class="gesture-icon-enhanced fs-1 mb-1">📄</span>
                            <div>Paper</div>
                        </button>
                        <button class="gesture-btn-enhanced btn btn-outline-danger btn-lg rounded-4 shadow-sm mx-2 px-4 py-3 d-flex flex-column align-items-center justify-content-center fw-bold fs-4" data-gesture="scissors">
                            <span class="gesture-icon-enhanced fs-1 mb-1">✂️</span>
                            <div>Scissors</div>
                        </button>
                    </div>

                    <!-- Controls row -->
                    <div class="d-flex justify-content-between align-items-center mt-4">
                        <div class="d-flex gap-2">
                            <button class="btn btn-secondary px-4 py-2" id="reset-btn">Reset</button>
                            <button class="btn btn-outline-info px-4 py-2" id="undo-btn" title="Undo last round (local only)">Undo</button>
                        </div>
                        <span id="fun-fact" class="badge bg-warning text-dark fs-6"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="text-center text-muted mt-5">
            <small>Made with ❤️ | Subroto Sarkar | 2025</small>
        </footer>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Main Game Logic -->
    <script src="script.js"></script>
</body>
</html>
